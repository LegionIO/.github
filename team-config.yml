# Granular path-level overrides for multi-team repos.
# These add additional team reviewers for specific paths.
path_overrides:
  LegionIO:
    - path: "lib/legion/cli/chat/"
      team: ai
    - path: "lib/legion/api/"
      team: core
    - path: "lib/legion/extensions/"
      team: extensions
    - path: ".github/"
      team: infra
  .github:
    - path: ".github/workflows/"
      team: infra
    - path: "labels.yml"
      team: infra
    - path: "team-config.yml"
      team: infra

# Branch protection profiles.
# Applied to the default branch (main) of each repo.
branch_protection:
  profiles:
    # Most repos: no required reviews, no required checks, basic safety
    standard:
      required_pull_request_reviews: null
      enforce_admins: false
      required_status_checks: null
      allow_force_pushes: false
      allow_deletions: false

    # All lex-* repos: require CI + code quality (lint-patterns) checks to pass
    lex:
      required_pull_request_reviews: null
      enforce_admins: false
      required_status_checks:
        strict: false
        contexts:
          - "RSpec (Ruby 3.4)"
          - "RuboCop"
          - "Gemfile.lock Check"
          - "Helper Migration"
          - "Constant Safety"
          - "Framework Conventions"
      allow_force_pushes: false
      allow_deletions: false

    # Framework + core libraries: require CI, no lint-patterns required
    # Review count at 0 for solo dev — bump when adding contributors
    core:
      required_pull_request_reviews: null
      enforce_admins: false
      required_status_checks:
        strict: false
        contexts:
          - "RSpec (Ruby 3.4)"
          - "RuboCop"
      allow_force_pushes: false
      allow_deletions: false

    # Critical infrastructure: strictest rules
    # Review count at 0 for solo dev — bump when adding contributors
    strict:
      required_pull_request_reviews: null
      enforce_admins: false
      required_status_checks:
        strict: true
        contexts:
          - "RSpec (Ruby 3.4)"
          - "RuboCop"
      allow_force_pushes: false
      allow_deletions: false

  # Default profile per team
  team_defaults:
    core: core
    ai: core
    agentic: lex
    extensions: lex
    frontend: standard
    infra: strict
    sdk: standard

  # Per-repo overrides (takes precedence over team default)
  overrides:
    LegionIO: strict
    legion-llm: core
    legion-gaia: core
    homebrew-tap: strict
    .github: strict
