# LegionIO GitHub Team, CODEOWNERS & Branch Protection Configuration
#
# Source of truth for team membership, repo ownership, CODEOWNERS, and branch protection.
#
# Workflow: sync-codeowners.yml reads this file to:
#   1. Create/update GitHub teams and memberships
#   2. Assign team→repo permissions (pull/push/admin)
#   3. Generate CODEOWNERS files into codeowners-generated/
#   4. Apply branch protection rules to all repos
#
# To apply generated CODEOWNERS to repos, run:
#   scripts/apply-codeowners.sh [repo-name]

teams:
  maintainers:
    description: Top-level owners, fallback for all repos
    members: [Esity]
    permission: admin  # admin on all repos (applied via maintainers fallback)

