name: Welcome
on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: >
            Welcome to LegionIO! Thanks for opening your first issue.
            A maintainer will review this soon. In the meantime, check out our
            [contributing guide](https://github.com/LegionIO/.github/blob/main/CONTRIBUTING.md)
            and [philosophy](https://legionio.dev/philosophy.html).
          pr-message: >
            Welcome to LegionIO! Thanks for your first pull request.
            Please make sure specs pass (`bundle exec rspec`) and rubocop is clean
            (`bundle exec rubocop`). A maintainer will review this soon.
