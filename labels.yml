# Canonical label definitions for all LegionIO repositories.
# Synced by .github/workflows/sync-labels.yml

# --- Type ---
- name: "type:bug"
  color: "d73a4a"
  description: "Something isn't working"

- name: "type:enhancement"
  color: "a2eeef"
  description: "New feature or improvement"

- name: "type:docs"
  color: "0075ca"
  description: "Documentation only"

- name: "type:chore"
  color: "e4e669"
  description: "Maintenance, deps, CI"

- name: "type:breaking"
  color: "b60205"
  description: "Breaking change"

- name: "type:security"
  color: "b60205"
  description: "Security vulnerability or hardening"

- name: "type:performance"
  color: "d4c5f9"
  description: "Performance improvement"

- name: "type:refactor"
  color: "c2e0c6"
  description: "Code refactoring (no behavior change)"

- name: "type:question"
  color: "d876e3"
  description: "Question or discussion"

# --- Priority ---
- name: "priority:critical"
  color: "b60205"
  description: "Must fix immediately"

- name: "priority:high"
  color: "d93f0b"
  description: "Next up"

- name: "priority:medium"
  color: "fbca04"
  description: "Normal priority"

- name: "priority:low"
  color: "0e8a16"
  description: "Nice to have"

# --- Area ---
- name: "area:transport"
  color: "c5def5"
  description: "RabbitMQ / AMQP messaging"

- name: "area:crypt"
  color: "c5def5"
  description: "Encryption, Vault, JWT"

- name: "area:data"
  color: "c5def5"
  description: "Database / Sequel ORM"

- name: "area:cache"
  color: "c5def5"
  description: "Redis / Memcached caching"

- name: "area:settings"
  color: "c5def5"
  description: "Configuration management"

- name: "area:logging"
  color: "c5def5"
  description: "Logging"

- name: "area:json"
  color: "c5def5"
  description: "JSON serialization"

- name: "area:cli"
  color: "c5def5"
  description: "CLI commands"

- name: "area:api"
  color: "c5def5"
  description: "REST API"

- name: "area:mcp"
  color: "c5def5"
  description: "MCP server"

- name: "area:extensions"
  color: "c5def5"
  description: "Extension system / LEX"

- name: "area:actors"
  color: "c5def5"
  description: "Actor execution modes"

- name: "area:runners"
  color: "c5def5"
  description: "Runner functions"

- name: "area:llm"
  color: "c5def5"
  description: "LLM integration / AI providers"

- name: "area:cognitive"
  color: "c5def5"
  description: "Agentic extensions / GAIA"

- name: "area:chat"
  color: "c5def5"
  description: "Chat REPL / tools / sessions"

- name: "area:workers"
  color: "c5def5"
  description: "Digital workers / lifecycle"

- name: "area:telemetry"
  color: "c5def5"
  description: "Telemetry, metrics, tracing"

- name: "area:audit"
  color: "c5def5"
