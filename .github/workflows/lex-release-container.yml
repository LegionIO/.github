name: Release Lex Container

on:
  workflow_call:
    inputs:
      ruby-version:
        description: Ruby version for building and publishing the gem
        default: '3.4'
        type: string
        required: false
      runner:
        description: "Runner label (set to 'legion' for self-hosted, 'ubuntu-latest' for GitHub-hosted)"
        default: 'ubuntu-latest'
        type: string
        required: false
      changelog-file:
        description: Path to CHANGELOG.md
        default: CHANGELOG.md
        type: string
        required: false
      base-image:
        description: Docker image used as the Packer source image
        default: ghcr.io/legionio/legion-core:latest
        type: string
        required: false
      image-name:
        description: Container image name. Defaults to the repository name.
        default: ''
        type: string
        required: false
      ghcr-registry:
        description: GHCR registry prefix
        default: ghcr.io/legionio
        type: string
        required: false
      dockerhub-namespace:
        description: Docker Hub namespace
        default: legionio
        type: string
        required: false
    outputs:
      released:
        description: Whether a new version was released
        value: ${{ jobs.release.outputs.released }}
      version:
        description: The released version string
        value: ${{ jobs.release.outputs.version }}
      tag:
        description: The git tag created
        value: ${{ jobs.release.outputs.tag }}
      image-name:
        description: Container image name
        value: ${{ jobs.release.outputs.image-name }}
    secrets:
      rubygems-api-key:
        description: RubyGems API key for publishing
        required: true
      dockerhub-username:
        description: Docker Hub username
        required: true
      dockerhub-token:
        description: Docker Hub token or password
        required: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release Gem
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    outputs:
      released: ${{ steps.check.outputs.needed }}
      version: ${{ steps.detect.outputs.version }}
      tag: ${{ steps.detect.outputs.tag }}
      gem-name: ${{ steps.detect.outputs.gem_name }}
      image-name: ${{ steps.meta.outputs.image_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect gem metadata
        id: detect
        run: |
          set -euo pipefail
          version=""
          gem_name=""

          if ls *.gemspec 1>/dev/null 2>&1; then
            version=$(ruby -e "puts Gem::Specification.load(Dir['*.gemspec'].first).version" 2>/dev/null || true)
            gem_name=$(ruby -e "puts Gem::Specification.load(Dir['*.gemspec'].first).name" 2>/dev/null || true)
          fi

          if [ -z "$version" ]; then
            while IFS= read -r vf; do
              version=$(grep -oE "VERSION[[:space:]]*=[[:space:]]*['\"][^'\"]*" "$vf" \
                | sed "s/.*['\"]//" || true)
              if [ -n "$version" ]; then
                echo "Found version $version in $vf"
                break
              fi
            done < <(find . -path './.git' -prune -o -path './vendor' -prune -o -name 'version.rb' -print | awk -F/ '{print NF, $0}' | sort -n | cut -d' ' -f2-)
          fi

          if [ -z "$gem_name" ]; then
            gem_name="${GITHUB_REPOSITORY#*/}"
          fi

          if [ -z "$version" ]; then
            echo "No version found in gemspec or version.rb"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "gem_name=$gem_name" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "gem_name=$gem_name" >> "$GITHUB_OUTPUT"
          echo "Detected $gem_name version $version"

      - name: Derive image name
        id: meta
        env:
          INPUT_IMAGE_NAME: ${{ inputs.image-name }}
          REPOSITORY: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          image_name="${INPUT_IMAGE_NAME:-$REPOSITORY}"
          image_name=$(echo "$image_name" | tr '[:upper:]' '[:lower:]')
          echo "image_name=$image_name" >> "$GITHUB_OUTPUT"
          echo "Image name: $image_name"

      - name: Check if release already exists
        if: steps.detect.outputs.version != ''
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.detect.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "No release found for $TAG, proceeding"
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog
        if: steps.check.outputs.needed == 'true'
        id: changelog
        env:
          VERSION: ${{ steps.detect.outputs.version }}
          CHANGELOG_PATH: ${{ inputs.changelog-file }}
        run: |
          set -euo pipefail
          if [ ! -f "$CHANGELOG_PATH" ]; then
            echo "Release v$VERSION" > /tmp/release_notes.md
            echo "body_file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          awk -v ver="$VERSION" '
            /^## / {
              if (found) exit
              if (index($0, ver)) found=1
              next
            }
            found { print }
          ' "$CHANGELOG_PATH" > /tmp/release_notes.md

          if [ ! -s /tmp/release_notes.md ]; then
            echo "Release v$VERSION" > /tmp/release_notes.md
          fi

          echo "body_file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      - uses: ruby/setup-ruby@v1
        if: steps.check.outputs.needed == 'true'
        with:
          ruby-version: ${{ inputs.ruby-version }}
          bundler-cache: true

      - name: Build gem
        if: steps.check.outputs.needed == 'true'
        id: build
        run: |
          gem build *.gemspec
          echo "gem_file=$(ls -t *.gem | head -1)" >> "$GITHUB_OUTPUT"

      - name: Create git tag
        if: steps.check.outputs.needed == 'true'
        env:
          TAG: ${{ steps.detect.outputs.tag }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub release
        if: steps.check.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.detect.outputs.tag }}
          NOTES_FILE: ${{ steps.changelog.outputs.body_file }}
          GEM_FILE: ${{ steps.build.outputs.gem_file }}
        run: gh release create "$TAG" --title "$TAG" --notes-file "$NOTES_FILE" "$GEM_FILE"

      - name: Publish to RubyGems
        if: steps.check.outputs.needed == 'true'
        env:
          GEM_HOST_API_KEY: ${{ secrets.rubygems-api-key }}
          GEM_FILE: ${{ steps.build.outputs.gem_file }}
        run: gem push "$GEM_FILE"

      - name: Publish to GitHub Packages
        if: steps.check.outputs.needed == 'true'
        env:
          GEM_HOST_API_KEY: "Bearer ${{ github.token }}"
          OWNER: ${{ github.repository_owner }}
          GEM_FILE: ${{ steps.build.outputs.gem_file }}
        run: |
          gem push --host "https://rubygems.pkg.github.com/${OWNER}" "$GEM_FILE"

  container:
    name: Build Lex Container
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Packer
        uses: hashicorp/setup-packer@main

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.dockerhub-username }}
          password: ${{ secrets.dockerhub-token }}

      - name: Pull base image
        env:
          BASE_IMAGE: ${{ inputs.base-image }}
        run: docker pull "$BASE_IMAGE"

      - name: Write Packer template
        env:
          WORKDIR: ${{ runner.temp }}/lex-container
        run: |
          set -euo pipefail
          mkdir -p "$WORKDIR"
          cat > "$WORKDIR/lex.pkr.hcl" <<'PACKER'
          packer {
            required_plugins {
              docker = {
                version = ">= 1.1.0"
                source  = "github.com/hashicorp/docker"
              }
            }
          }

          variable "base_image" {
            type        = string
            default     = "ghcr.io/legionio/legion-core:latest"
            description = "Core image to build on"
          }

          variable "version" {
            type        = string
            description = "Image tag version"
          }

          variable "registry" {
            type        = string
            default     = "ghcr.io/legionio"
            description = "Container registry prefix"
          }

          variable "image_name" {
            type        = string
            description = "Container image name"
          }

          variable "gem_name" {
            type        = string
            description = "Lex gem name"
          }

          variable "gem_version" {
            type        = string
            description = "Lex gem version"
          }

          source "docker" "lex" {
            image  = var.base_image
            commit = true
            changes = [
              "ENV LEGION_ROLE_PROFILE=custom",
              "ENV LEGION_PROCESS_ROLE=worker",
              "HEALTHCHECK --interval=30s --timeout=5s --retries=3 CMD curl -sf http://localhost:4567/health || exit 1",
            ]
          }

          build {
            sources = ["source.docker.lex"]

            provisioner "shell" {
              environment_vars = [
                "GEM_HOME=/opt/legion/gems",
                "PATH=/opt/legion/gems/bin:/usr/local/bundle/bin:/usr/local/bin:/usr/bin:/bin",
              ]
              inline = [
                "gem install --no-document legionio lex-node",
                "installed=false; for i in 1 2 3 4 5; do if gem install --no-document ${var.gem_name} -v ${var.gem_version}; then installed=true; break; fi; echo Waiting for ${var.gem_name} ${var.gem_version} to become available; sleep $((i * 15)); done; [ \"$installed\" = true ]",
                "chown -R legion:legion /opt/legion/gems",
              ]
            }

            post-processor "docker-tag" {
              repository = "${var.registry}/${var.image_name}"
              tags       = [var.version, "latest"]
            }
          }
          PACKER

      - name: Packer init
        working-directory: ${{ runner.temp }}/lex-container
        run: packer init .

      - name: Build image with Packer
        working-directory: ${{ runner.temp }}/lex-container
        env:
          BASE_IMAGE: ${{ inputs.base-image }}
          GEM_NAME: ${{ needs.release.outputs.gem-name }}
          GHCR_REGISTRY: ${{ inputs.ghcr-registry }}
          IMAGE_NAME: ${{ needs.release.outputs.image-name }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          packer build \
            -var "base_image=${BASE_IMAGE}" \
            -var "gem_name=${GEM_NAME}" \
            -var "gem_version=${VERSION}" \
            -var "image_name=${IMAGE_NAME}" \
            -var "registry=${GHCR_REGISTRY}" \
            -var "version=v${VERSION}" \
            .

      - name: Push to GHCR
        env:
          GHCR_REGISTRY: ${{ inputs.ghcr-registry }}
          IMAGE_NAME: ${{ needs.release.outputs.image-name }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          docker push "${GHCR_REGISTRY}/${IMAGE_NAME}:v${VERSION}"
          docker push "${GHCR_REGISTRY}/${IMAGE_NAME}:latest"

      - name: Tag and push to Docker Hub
        env:
          DOCKERHUB_NAMESPACE: ${{ inputs.dockerhub-namespace }}
          GHCR_REGISTRY: ${{ inputs.ghcr-registry }}
          IMAGE_NAME: ${{ needs.release.outputs.image-name }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          docker tag "${GHCR_REGISTRY}/${IMAGE_NAME}:v${VERSION}" "docker.io/${DOCKERHUB_NAMESPACE}/${IMAGE_NAME}:v${VERSION}"
          docker tag "${GHCR_REGISTRY}/${IMAGE_NAME}:latest" "docker.io/${DOCKERHUB_NAMESPACE}/${IMAGE_NAME}:latest"
          docker push "docker.io/${DOCKERHUB_NAMESPACE}/${IMAGE_NAME}:v${VERSION}"
          docker push "docker.io/${DOCKERHUB_NAMESPACE}/${IMAGE_NAME}:latest"
