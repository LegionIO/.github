name: Sync Teams, CODEOWNERS & Branch Protection

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [team-config.yml]

permissions:
  contents: write

jobs:
  sync:
    name: Sync Teams, CODEOWNERS & Branch Protection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync GitHub teams and memberships
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::ORG_ADMIN_TOKEN secret is not set. Create a PAT with admin:org scope."
            exit 1
          fi

          echo "=== Syncing GitHub teams ==="

          TEAMS=$(yq -r '.teams | keys | .[]' team-config.yml)

          for team in $TEAMS; do
            desc=$(yq -r ".teams.${team}.description" team-config.yml)
            members=$(yq -r ".teams.${team}.members // [] | .[]" team-config.yml)

            if gh api "orgs/LegionIO/teams/${team}" >/dev/null 2>&1; then
              echo "Team '${team}' exists, updating description"
              gh api "orgs/LegionIO/teams/${team}" \
                --method PATCH \
                -f description="${desc}" \
                --silent 2>/dev/null || true
            else
              echo "Creating team '${team}'"
              gh api orgs/LegionIO/teams \
                --method POST \
                -f name="${team}" \
                -f description="${desc}" \
                -f privacy="closed" \
                --silent
            fi

            for member in $members; do
              echo "  Adding ${member} to ${team}"
              gh api "orgs/LegionIO/teams/${team}/memberships/${member}" \
                --method PUT \
                -f role="maintainer" \
                --silent 2>/dev/null || echo "  WARN: failed to add ${member} to ${team}"
            done
          done

          echo ""
          echo "Team sync complete."

      - name: Assign team repo permissions
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          set -euo pipefail

          echo "=== Assigning team repo permissions ==="

          # Fetch archived repos to skip
          ARCHIVED_REPOS=$(gh repo list LegionIO --limit 400 --json name,isArchived --jq '[.[] | select(.isArchived) | .name] | .[]')
          declare -A IS_ARCHIVED
          for r in $ARCHIVED_REPOS; do
            IS_ARCHIVED["$r"]=1
          done

          TEAMS=$(yq -r '.teams | keys | .[]' team-config.yml)
          ASSIGNED=0
          SKIPPED=0

          for team in $TEAMS; do
            [ "$team" = "maintainers" ] && continue

            permission=$(yq -r ".teams.${team}.permission // \"push\"" team-config.yml)
            repos=$(yq -r ".teams.${team}.repos // [] | .[]" team-config.yml)
            [ -z "$repos" ] && continue

            echo "--- ${team} (${permission}) ---"

            for repo in $repos; do
              if [ -n "${IS_ARCHIVED[$repo]:-}" ]; then
                SKIPPED=$((SKIPPED + 1))
                continue
              fi

              if gh api "orgs/LegionIO/teams/${team}/repos/LegionIO/${repo}" \
                --method PUT \
                -f permission="${permission}" \
                --silent 2>/dev/null; then
                ASSIGNED=$((ASSIGNED + 1))
              else
                echo "  WARN: failed to assign ${repo}"
              fi

              sleep 0.1
            done
          done

          echo ""
          echo "Repo permissions: Assigned=${ASSIGNED} Skipped=${SKIPPED}"

      - name: Generate CODEOWNERS files
        run: |
          set -euo pipefail

          echo "=== Generating CODEOWNERS files ==="

          mkdir -p codeowners-generated
          TEAMS=$(yq -r '.teams | keys | .[]' team-config.yml)
          GENERATED=0

          for team in $TEAMS; do
            [ "$team" = "maintainers" ] && continue

            repos=$(yq -r ".teams.${team}.repos // [] | .[]" team-config.yml)
            [ -z "$repos" ] && continue

            for repo in $repos; do
              dir="codeowners-generated/${repo}"
              mkdir -p "$dir"

              {
                echo "# Auto-generated from team-config.yml"
                echo "# Team: ${team}"
                echo "#"
                echo "# To apply: scripts/apply-codeowners.sh ${repo}"
                echo ""
                echo "* @LegionIO/maintainers"
                echo "* @LegionIO/${team}"
              } > "${dir}/CODEOWNERS"

              overrides=$(yq -r ".path_overrides.\"${repo}\" // [] | length" team-config.yml)
              if [ "$overrides" -gt 0 ]; then
                echo "" >> "${dir}/CODEOWNERS"
                echo "# Path-specific reviewers" >> "${dir}/CODEOWNERS"
                count=$(yq -r ".path_overrides.\"${repo}\" | length" team-config.yml)
                for i in $(seq 0 $((count - 1))); do
                  path=$(yq -r ".path_overrides.\"${repo}\"[${i}].path" team-config.yml)
                  override_team=$(yq -r ".path_overrides.\"${repo}\"[${i}].team" team-config.yml)
                  echo "${path} @LegionIO/${override_team}" >> "${dir}/CODEOWNERS"
                done
              fi

              GENERATED=$((GENERATED + 1))
            done
          done

          echo "Generated CODEOWNERS for ${GENERATED} repos"

      - name: Commit generated CODEOWNERS
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add codeowners-generated/
          if git diff --cached --quiet; then
            echo "No CODEOWNERS changes to commit"
          else
            git commit -m "generate CODEOWNERS from team-config.yml"
            git push
          fi

      - name: Apply branch protection rules
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          set -euo pipefail

          echo "=== Applying branch protection rules ==="

          TEAMS=$(yq -r '.teams | keys | .[]' team-config.yml)
          APPLIED=0
          SKIPPED=0
          FAILED=0

          # Build repo→profile mapping
          declare -A REPO_PROFILE

          # First pass: assign team defaults
          for team in $TEAMS; do
            [ "$team" = "maintainers" ] && continue
            default_profile=$(yq -r ".branch_protection.team_defaults.${team} // \"standard\"" team-config.yml)
            repos=$(yq -r ".teams.${team}.repos // [] | .[]" team-config.yml)
            [ -z "$repos" ] && continue
            for repo in $repos; do
              REPO_PROFILE["$repo"]="$default_profile"
            done
          done

          # Second pass: apply per-repo overrides
          override_repos=$(yq -r '.branch_protection.overrides // {} | keys | .[]' team-config.yml)
          for repo in $override_repos; do
            profile=$(yq -r ".branch_protection.overrides.\"${repo}\"" team-config.yml)
            REPO_PROFILE["$repo"]="$profile"
          done

          # Fetch archived repos to skip them
          ARCHIVED_REPOS=$(gh repo list LegionIO --limit 400 --json name,isArchived --jq '[.[] | select(.isArchived) | .name] | .[]')
          declare -A IS_ARCHIVED
          for r in $ARCHIVED_REPOS; do
            IS_ARCHIVED["$r"]=1
          done
          echo "Found $(echo "$ARCHIVED_REPOS" | grep -c . || echo 0) archived repos to skip"

          # Apply protections
          for repo in "${!REPO_PROFILE[@]}"; do
            profile="${REPO_PROFILE[$repo]}"

            # Skip archived repos
            if [ -n "${IS_ARCHIVED[$repo]:-}" ]; then
              echo "${repo} [${profile}] ... SKIP (archived)"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            # Read profile settings
            reviews_count=$(yq -r ".branch_protection.profiles.${profile}.required_pull_request_reviews.required_approving_review_count // \"null\"" team-config.yml)
            dismiss_stale=$(yq -r ".branch_protection.profiles.${profile}.required_pull_request_reviews.dismiss_stale_reviews // false" team-config.yml)
            enforce_admins=$(yq -r ".branch_protection.profiles.${profile}.enforce_admins // false" team-config.yml)
            strict_checks=$(yq -r ".branch_protection.profiles.${profile}.required_status_checks.strict // false" team-config.yml)
            check_contexts=$(yq -r ".branch_protection.profiles.${profile}.required_status_checks.contexts // [] | .[]" team-config.yml 2>/dev/null || true)
            has_checks=$(yq -r ".branch_protection.profiles.${profile}.required_status_checks // \"null\"" team-config.yml)
            has_reviews=$(yq -r ".branch_protection.profiles.${profile}.required_pull_request_reviews // \"null\"" team-config.yml)
            allow_force=$(yq -r ".branch_protection.profiles.${profile}.allow_force_pushes // false" team-config.yml)
            allow_delete=$(yq -r ".branch_protection.profiles.${profile}.allow_deletions // false" team-config.yml)

            # Build the JSON payload
            payload="{}"
            payload=$(echo "$payload" | jq --argjson v "$enforce_admins" '.enforce_admins = $v')
            payload=$(echo "$payload" | jq --argjson v "$allow_force" '.allow_force_pushes = $v')
            payload=$(echo "$payload" | jq --argjson v "$allow_delete" '.allow_deletions = $v')

            # Required status checks
            if [ "$has_checks" != "null" ] && [ -n "$check_contexts" ]; then
              contexts_json="[]"
              for ctx in $check_contexts; do
                contexts_json=$(echo "$contexts_json" | jq --arg c "$ctx" '. + [$c]')
              done
              payload=$(echo "$payload" | jq --argjson s "$strict_checks" --argjson c "$contexts_json" \
                '.required_status_checks = { strict: $s, contexts: $c }')
            else
              payload=$(echo "$payload" | jq '.required_status_checks = null')
            fi

            # Required pull request reviews
            if [ "$has_reviews" != "null" ] && [ "$reviews_count" != "null" ]; then
              payload=$(echo "$payload" | jq --argjson n "$reviews_count" --argjson d "$dismiss_stale" \
                '.required_pull_request_reviews = { required_approving_review_count: $n, dismiss_stale_reviews: $d }')
            else
              payload=$(echo "$payload" | jq '.required_pull_request_reviews = null')
            fi

            # Restrictions (null = no push restrictions)
            payload=$(echo "$payload" | jq '.restrictions = null')

            echo -n "${repo} [${profile}] ... "

            if echo "$payload" | gh api \
              "repos/LegionIO/${repo}/branches/main/protection" \
              --method PUT \
              --input - \
              --silent 2>/dev/null; then
              echo "OK"
              APPLIED=$((APPLIED + 1))
            else
              echo "FAILED (branch may not exist)"
              FAILED=$((FAILED + 1))
            fi

            sleep 0.2
          done

          echo ""
          echo "Branch protection: Applied=${APPLIED} Skipped=${SKIPPED} Failed=${FAILED}"

      - name: Generate diff report
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          set -euo pipefail

          echo "=== CODEOWNERS Diff Report ==="
          echo ""

          TOTAL=0
          MATCHING=0
          MISSING=0
          OUTDATED=0

          for dir in codeowners-generated/*/; do
            repo=$(basename "$dir")
            TOTAL=$((TOTAL + 1))
            local_file="${dir}CODEOWNERS"

            remote_content=$(gh api "repos/LegionIO/${repo}/contents/.github/CODEOWNERS" \
              --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || true)

            if [ -z "$remote_content" ]; then
              echo "MISSING  ${repo}"
              MISSING=$((MISSING + 1))
            elif diff -q <(echo "$remote_content") "$local_file" >/dev/null 2>&1; then
              MATCHING=$((MATCHING + 1))
            else
              echo "OUTDATED ${repo}"
              OUTDATED=$((OUTDATED + 1))
            fi
          done

          echo ""
          echo "Total: ${TOTAL} | Current: ${MATCHING} | Missing: ${MISSING} | Outdated: ${OUTDATED}"
          echo ""

          if [ $((MISSING + OUTDATED)) -gt 0 ]; then
            echo "Run 'scripts/apply-codeowners.sh' locally to push CODEOWNERS to repos."
          else
            echo "All repos are up to date."
          fi
