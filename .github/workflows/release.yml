name: Release Gem

on:
  workflow_call:
    inputs:
      ruby-version:
        description: Ruby version for building the gem
        default: '3.4'
        type: string
        required: false
      runner:
        description: "Runner label (set to 'legion' for self-hosted, 'ubuntu-latest' for GitHub-hosted)"
        default: 'legion'
        type: string
        required: false
      changelog-file:
        description: 'Path to CHANGELOG.md'
        default: 'CHANGELOG.md'
        type: string
        required: false
    outputs:
      released:
        description: Whether a new version was released
        value: ${{ jobs.release.outputs.released }}
      version:
        description: The released version string
        value: ${{ jobs.release.outputs.version }}
      tag:
        description: The git tag created
        value: ${{ jobs.release.outputs.tag }}
    secrets:
      rubygems-api-key:
        description: RubyGems API key for publishing
        required: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    outputs:
      released: ${{ steps.check.outputs.needed }}
      version: ${{ steps.detect.outputs.version }}
      tag: ${{ steps.detect.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version from source
        id: detect
        run: |
          set -euo pipefail
          version=""

          # Prefer gemspec version (authoritative)
          if ls *.gemspec 1>/dev/null 2>&1; then
            version=$(ruby -e "puts Gem::Specification.load(Dir['*.gemspec'].first).version" 2>/dev/null || true)
          fi

          # Fall back to shallowest version.rb
          if [ -z "$version" ]; then
            while IFS= read -r vf; do
              version=$(grep -oE "VERSION[[:space:]]*=[[:space:]]*['\"][^'\"]*" "$vf" \
                | sed "s/.*['\"]//" || true)
              if [ -n "$version" ]; then
                echo "Found version $version in $vf"
                break
              fi
            done < <(find . -path './.git' -prune -o -path './vendor' -prune -o -name 'version.rb' -print | awk -F/ '{print NF, $0}' | sort -n | cut -d' ' -f2-)
          fi

          if [ -z "$version" ]; then
            echo "No version found in gemspec or version.rb"
            echo "version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "Detected version: $version"

      - name: Check if release already exists
        if: steps.detect.outputs.version != ''
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.detect.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "No release found for $TAG, proceeding"
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog
        if: steps.check.outputs.needed == 'true'
        id: changelog
        env:
          VERSION: ${{ steps.detect.outputs.version }}
          CHANGELOG_PATH: ${{ inputs.changelog-file }}
        run: |
          set -euo pipefail
          if [ ! -f "$CHANGELOG_PATH" ]; then
            echo "Release v$VERSION" > /tmp/release_notes.md
            echo "body_file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # extract the section for this version (supports ## [X.Y.Z] and ## vX.Y.Z)
          awk -v ver="$VERSION" '
            /^## / {
              if (found) exit
              if (index($0, ver)) found=1
              next
            }
            found { print }
          ' "$CHANGELOG_PATH" > /tmp/release_notes.md

          if [ ! -s /tmp/release_notes.md ]; then
            echo "Release v$VERSION" > /tmp/release_notes.md
          fi

          echo "body_file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      - uses: ruby/setup-ruby@v1
        if: steps.check.outputs.needed == 'true'
        with:
          ruby-version: ${{ inputs.ruby-version }}
          bundler-cache: true

      - name: Build gem
        if: steps.check.outputs.needed == 'true'
        id: build
        run: |
          gem build *.gemspec
          echo "gem_file=$(ls -t *.gem | head -1)" >> "$GITHUB_OUTPUT"

      - name: Create git tag
        if: steps.check.outputs.needed == 'true'
        env:
          TAG: ${{ steps.detect.outputs.tag }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub release
        if: steps.check.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.detect.outputs.tag }}
          NOTES_FILE: ${{ steps.changelog.outputs.body_file }}
          GEM_FILE: ${{ steps.build.outputs.gem_file }}
        run: gh release create "$TAG" --title "$TAG" --notes-file "$NOTES_FILE" "$GEM_FILE"

      - name: Publish to RubyGems
        if: steps.check.outputs.needed == 'true'
        env:
          GEM_HOST_API_KEY: ${{ secrets.rubygems-api-key }}
          GEM_FILE: ${{ steps.build.outputs.gem_file }}
        run: gem push "$GEM_FILE"

      - name: Publish to GitHub Packages
        if: steps.check.outputs.needed == 'true'
        env:
          GEM_HOST_API_KEY: "Bearer ${{ github.token }}"
          OWNER: ${{ github.repository_owner }}
          GEM_FILE: ${{ steps.build.outputs.gem_file }}
        run: |
          gem push --host "https://rubygems.pkg.github.com/${OWNER}" "$GEM_FILE"
