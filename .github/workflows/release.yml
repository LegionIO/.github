name: Release Gem

on:
  workflow_call:
    inputs:
      ruby-version:
        description: Ruby version for building the gem
        default: '3.4'
        type: string
        required: false
      changelog-file:
        description: 'Path to CHANGELOG.md'
        default: 'CHANGELOG.md'
        type: string
        required: false
    outputs:
      changed:
        description: Whether a new version was released
        value: ${{ jobs.release.outputs.changed }}
      version:
        description: The released version string
        value: ${{ jobs.release.outputs.version }}
      tag:
        description: The git tag created
        value: ${{ jobs.release.outputs.tag }}
    secrets:
      rubygems-api-key:
        description: RubyGems API key for publishing
        required: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.current }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version from source
        id: version
        run: |
          set -euo pipefail
          # Prefer gemspec version (authoritative), fall back to shallowest version.rb
          current=""
          if ls *.gemspec 1>/dev/null 2>&1; then
            current=$(ruby -e "puts Gem::Specification.load(Dir['*.gemspec'].first).version" 2>/dev/null || true)
          fi

          if [ -z "$current" ]; then
            # Fall back to version.rb search, shallowest path first
            while IFS= read -r vf; do
              current=$(grep -oE "VERSION[[:space:]]*=[[:space:]]*['\"][^'\"]*" "$vf" \
                | sed "s/.*['\"]//" || true)
              if [ -n "$current" ]; then
                echo "Found version $current in $vf"
                break
              fi
            done < <(find . -path './.git' -prune -o -path './vendor' -prune -o -name 'version.rb' -print | awk -F/ '{print NF, $0}' | sort -n | cut -d' ' -f2-)
          fi

          if [ -z "$current" ]; then
            echo "No version.rb with a string literal VERSION found"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "tag=v$current" >> "$GITHUB_OUTPUT"

          if git rev-parse "v$current" >/dev/null 2>&1; then
            echo "Tag v$current already exists, skipping release"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version detected: $current"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog
        if: steps.version.outputs.changed == 'true'
        id: changelog
        env:
          VERSION: ${{ steps.version.outputs.current }}
          CHANGELOG_PATH: ${{ inputs.changelog-file }}
        run: |
          set -euo pipefail
          if [ ! -f "$CHANGELOG_PATH" ]; then
            echo "Release v$VERSION" > /tmp/release_notes.md
            echo "body_file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # extract the section for this version (between ## vX.Y.Z headers)
          awk -v ver="$VERSION" '
            /^## v/ {
              if (found) exit
              if (index($0, "v" ver)) found=1
              next
            }
            found { print }
          ' "$CHANGELOG_PATH" > /tmp/release_notes.md

          if [ ! -s /tmp/release_notes.md ]; then
            echo "Release v$VERSION" > /tmp/release_notes.md
          fi

          echo "body_file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      - uses: ruby/setup-ruby@v1
        if: steps.version.outputs.changed == 'true'
        with:
          ruby-version: ${{ inputs.ruby-version }}
          bundler-cache: true

      - name: Build gem
        if: steps.version.outputs.changed == 'true'
        run: gem build *.gemspec

      - name: Create git tag
        if: steps.version.outputs.changed == 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          NOTES_FILE: ${{ steps.changelog.outputs.body_file }}
        run: gh release create "$TAG" --title "$TAG" --notes-file "$NOTES_FILE" *.gem

      - name: Publish to RubyGems
        if: steps.version.outputs.changed == 'true'
        env:
          GEM_HOST_API_KEY: ${{ secrets.rubygems-api-key }}
        run: gem push *.gem

      - name: Publish to GitHub Packages
        if: steps.version.outputs.changed == 'true'
        env:
          GEM_HOST_API_KEY: "Bearer ${{ github.token }}"
          OWNER: ${{ github.repository_owner }}
        run: |
          gem push --host "https://rubygems.pkg.github.com/${OWNER}" *.gem
