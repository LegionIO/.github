name: Release Gem

on:
  workflow_call:
    inputs:
      ruby-version:
        description: Ruby version for building the gem
        default: '3.4'
        type: string
        required: false
    secrets:
      rubygems-api-key:
        description: RubyGems API key for publishing
        required: true

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ inputs.ruby-version }}
          bundler-cache: true

      - name: Build gem
        run: gem build *.gemspec

      - name: Publish to RubyGems
        env:
          GEM_HOST_API_KEY: ${{ secrets.rubygems-api-key }}
        run: |
          gem push *.gem
