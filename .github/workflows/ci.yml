name: Ruby CI

on:
  workflow_call:
    inputs:
      ruby-version:
        description: Ruby version to test against
        default: '3.4'
        type: string
        required: false
      ruby-versions:
        description: JSON array of Ruby versions for matrix testing (overrides ruby-version)
        default: ''
        type: string
        required: false
      run-rspec:
        description: Run RSpec tests
        default: true
        type: boolean
        required: false
      run-rubocop:
        description: Run RuboCop linting
        default: true
        type: boolean
        required: false
      needs-redis:
        description: Start a Redis service container
        default: false
        type: boolean
        required: false
      needs-rabbitmq:
        description: Start a RabbitMQ service container
        default: false
        type: boolean
        required: false

jobs:
  rspec:
    if: ${{ inputs.run-rspec }}
    name: "RSpec (Ruby ${{ matrix.ruby }})"
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        ruby: ${{ inputs.ruby-versions != '' && fromJSON(inputs.ruby-versions) || fromJSON(format('["{0}"]', inputs.ruby-version)) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start Redis
        if: ${{ inputs.needs-redis }}
        run: |
          docker run -d --name redis -p 6379:6379 redis:7-alpine
          timeout=30; elapsed=0
          until docker exec redis redis-cli ping 2>/dev/null; do
            sleep 1; elapsed=$((elapsed + 1))
            if [ $elapsed -ge $timeout ]; then
              echo "::error::Redis failed to start within ${timeout}s"
              docker logs redis
              exit 1
            fi
          done
          echo "Redis ready after ${elapsed}s"
      - name: Start RabbitMQ
        if: ${{ inputs.needs-rabbitmq }}
        run: |
          docker run -d --name rabbitmq -p 5672:5672 -p 15672:15672 rabbitmq:3-management-alpine
          timeout=60; elapsed=0
          until docker exec rabbitmq rabbitmq-diagnostics -q ping 2>/dev/null; do
            sleep 2; elapsed=$((elapsed + 2))
            if [ $elapsed -ge $timeout ]; then
              echo "::error::RabbitMQ failed to start within ${timeout}s"
              docker logs rabbitmq
              exit 1
            fi
          done
          echo "RabbitMQ ready after ${elapsed}s"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run RSpec
        run: bundle exec rspec

  rubocop:
    if: ${{ inputs.run-rubocop }}
    name: RuboCop
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ inputs.ruby-version || '3.4' }}
          bundler-cache: true
      - name: Run RuboCop
        run: bundle exec rubocop
