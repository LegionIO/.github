name: Ruby CI

on:
  workflow_call:
    inputs:
      ruby-version:
        description: Ruby version to test against
        default: '3.4'
        type: string
        required: false
      ruby-versions:
        description: JSON array of Ruby versions for matrix testing (overrides ruby-version)
        default: '["3.4", "4.0"]'
        type: string
        required: false
      run-rspec:
        description: Run RSpec tests
        default: true
        type: boolean
        required: false
      run-rubocop:
        description: Run RuboCop linting
        default: true
        type: boolean
        required: false
      needs-redis:
        description: Start a Redis service container
        default: false
        type: boolean
        required: false
      needs-memcached:
        description: Start a Memcached service container
        default: false
        type: boolean
        required: false
      needs-rabbitmq:
        description: Start a RabbitMQ service container
        default: false
        type: boolean
        required: false
      runner:
        description: "Runner label (set to 'legion' for self-hosted, 'ubuntu-latest' for GitHub-hosted)"
        default: 'ubuntu-latest'
        type: string
        required: false
    secrets:
      slack-bot-token:
        description: Slack bot token for failure notifications
        required: false

jobs:
  rspec:
    if: ${{ inputs.run-rspec }}
    name: "RSpec (Ruby ${{ matrix.ruby }})"
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        ruby: ${{ inputs.ruby-versions != '' && fromJSON(inputs.ruby-versions) || fromJSON(format('["{0}"]', inputs.ruby-version)) }}
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - name: Start Redis
        if: ${{ inputs.needs-redis }}
        run: |
          docker run -d --name redis -p 6379:6379 redis:7-alpine
          timeout=30; elapsed=0
          until docker exec redis redis-cli ping 2>/dev/null; do
            sleep 1; elapsed=$((elapsed + 1))
            if [ $elapsed -ge $timeout ]; then
              echo "::error::Redis failed to start within ${timeout}s"
              docker logs redis
              exit 1
            fi
          done
          echo "Redis ready after ${elapsed}s"
      - name: Start Memcached
        if: ${{ inputs.needs-memcached }}
        run: |
          docker run -d --name memcached -p 11211:11211 memcached:1-alpine -m 64 -I 8m
          timeout=15; elapsed=0
          until echo "version" | nc -w1 127.0.0.1 11211 2>/dev/null | grep -q VERSION; do
            sleep 1; elapsed=$((elapsed + 1))
            if [ $elapsed -ge $timeout ]; then
              echo "::error::Memcached failed to start within ${timeout}s"
              docker logs memcached
              exit 1
            fi
          done
          echo "Memcached ready after ${elapsed}s"
      - name: Start RabbitMQ
        if: ${{ inputs.needs-rabbitmq }}
        run: |
          docker run -d --name rabbitmq \
            -p 5672:5672 -p 15672:15672 \
            -e RABBITMQ_ERLANG_COOKIE='ci-test-cookie' \
            rabbitmq:3.13-management-alpine \
            sh -c 'echo "ci-test-cookie" > /var/lib/rabbitmq/.erlang.cookie && chmod 400 /var/lib/rabbitmq/.erlang.cookie && chown rabbitmq:rabbitmq /var/lib/rabbitmq/.erlang.cookie && exec docker-entrypoint.sh rabbitmq-server'
          timeout=90; elapsed=0
          until timeout 5 docker exec rabbitmq rabbitmq-diagnostics -q ping 2>/dev/null; do
            sleep 2; elapsed=$((elapsed + 2))
            if [ $elapsed -ge $timeout ]; then
              echo "::error::RabbitMQ failed to start within ${timeout}s"
              docker logs rabbitmq
              exit 1
            fi
          done
          echo "RabbitMQ ready after ${elapsed}s"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run RSpec
        run: bundle exec rspec
      - name: Notify Slack on failure
        if: ${{ failure() }}
        uses: kpritam/slack-job-status-action@v1
        continue-on-error: true
        with:
          job-status: ${{ job.status }}
          slack-bot-token: ${{ secrets.slack-bot-token }}
          channel: cicd

  rubocop:
    if: ${{ inputs.run-rubocop }}
    name: RuboCop
    timeout-minutes: 10
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ inputs.ruby-version || '3.4' }}
          bundler-cache: true
      - name: Run RuboCop
        run: bundle exec rubocop
      - name: Notify Slack on failure
        if: ${{ failure() }}
        uses: kpritam/slack-job-status-action@v1
        continue-on-error: true
        with:
          job-status: ${{ job.status }}
          slack-bot-token: ${{ secrets.slack-bot-token }}
          channel: cicd
