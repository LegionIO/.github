name: Security Scan

on:
  workflow_call:
    inputs:
      ruby-version:
        description: Ruby version to use for scanning
        default: '3.4'
        type: string
        required: false
      runner:
        description: "Runner label (set to 'legion' for self-hosted, 'ubuntu-latest' for GitHub-hosted)"
        default: 'ubuntu-latest'
        type: string
        required: false
      brakeman-enabled:
        description: Run Brakeman SAST scan (enable for gems with API/Sinatra routes)
        default: false
        type: boolean
        required: false

jobs:
  bundler-audit:
    name: Bundler Audit
    timeout-minutes: 10
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ inputs.ruby-version }}
          bundler-cache: true
      - name: Run bundler-audit
        run: bundle exec bundler-audit check --update

  ruby-audit:
    name: Ruby Audit
    timeout-minutes: 10
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ inputs.ruby-version }}
          bundler-cache: true
      - name: Run ruby_audit
        run: bundle exec ruby_audit check

  brakeman:
    if: ${{ inputs.brakeman-enabled }}
    name: Brakeman
    timeout-minutes: 10
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ inputs.ruby-version }}
          bundler-cache: true
      - name: Run Brakeman
        run: bundle exec brakeman --no-pager --format json --confidence-level 2
