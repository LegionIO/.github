name: Stale Cleanup

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner label (set to 'legion' for self-hosted, 'ubuntu-latest' for GitHub-hosted)"
        default: 'legion'
        type: string
        required: false
      days-before-stale:
        description: Days of inactivity before marking stale
        default: 60
        type: number
        required: false
      days-before-close:
        description: Days after stale label before closing
        default: 14
        type: number
        required: false

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Stale Cleanup
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: ${{ inputs.days-before-stale }}
          days-before-close: ${{ inputs.days-before-close }}
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has been automatically marked as stale due to
            inactivity. It will be closed in ${{ inputs.days-before-close }}
            days if no further activity occurs.
          stale-pr-message: >
            This PR has been automatically marked as stale due to
            inactivity. It will be closed in ${{ inputs.days-before-close }}
            days if no further activity occurs.
          close-issue-message: Closed due to inactivity. Reopen if still relevant.
          close-pr-message: Closed due to inactivity. Reopen if still relevant.
          exempt-issue-labels: "priority:critical,priority:high,status:blocked"
          exempt-pr-labels: "priority:critical,priority:high,status:blocked"
