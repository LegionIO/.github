name: Bug Report
description: Report something that isn't working correctly
labels: ["type:bug"]
body:
  - type: input
    id: gem
    attributes:
      label: Affected Gem
      description: Which gem has the bug?
      placeholder: e.g., legionio, legion-transport, lex-redis
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Gem Version
      placeholder: e.g., 1.2.0
    validations:
      required: true
  - type: input
    id: ruby-version
    attributes:
      label: Ruby Version
      placeholder: e.g., 3.4.1
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any error messages, stack traces, or log output.
      render: shell
